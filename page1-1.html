                <td valign="top"><p><font size="2"><img src="images/point%201_12.gif" width="12" height="12" align="top"></font><strong>世界上最早的捏麵藝術</strong><br>
                  捏麵真的的由來已不可考，但由出土於新疆土魯番阿斯塔那唐墓的麵製人俑和小豬，考古學家推斷距今已有一千三百四十多年了，由此可知這項民間技藝起源很早。</p>
                  <p><img src="images/point%201_12.gif" width="12" height="12" align="top"><strong>歷史上的傳說</strong><br>
                    <img src="page1-1/komin.jpg" width="100" height="100" border="1" align="right">相傳三國時代蜀漢（約在西元220至260年間）諸葛亮軍師於某次出兵征伐南蠻 ，渡江（今蘆江）突遇狂風大作、河水暴漲乃以糯米糰捏成人頭和牲畜模樣稱作「米人」祭祀之，江水即告平靜而有「捏米江人」（江米人）之名稱，軍隊因而順利橫渡並順利平定南蠻，而這也是現代食品饅（蠻）頭的由來，從此以後凡執此業者均供奉孔明為祖師爺。<br>
                    </p>
